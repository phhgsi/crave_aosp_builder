name: Start Runner

on:
  push:
    branches:
      - main

jobs:
  Start-Runner:
    runs-on: ubuntu-latest

    inputs:
      project-folder:
        description: 'The path to the project folder'
        required: true
      device-name:
        description: 'The name of the device'
        required: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up environment
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Configure the 'crave' environment
        run: |
          if [ "${DCDEVSPACE}" == "1" ]; then
            echo 'No need to set up crave, we are already running in devspace!'
          else
            mkdir ${HOME}/bin/
            curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
            mv ${PWD}/crave ${HOME}/bin/
            sudo ln -sf /home/${USER}/bin/crave /usr/bin/crave
            envsubst < ${PWD}/crave.conf.sample >> ${PWD}/crave.conf
            rm -rf ${PWD}/crave.conf.sample
          fi
        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}

      - name: Run crave devspace
        run: |
          crave devspace -- "if tmux has-session -t ghactions; then 
            echo 'Runner is already Running'; 
          else 
            tmux kill-session -t ghactions;
            tmux new-session -d -s ghactions; 
            tmux send-keys -t ghactions './actions-runner/run.sh' Enter; 
            echo 'Runner Started'; 
          fi"

      # Upload to Telegram
      - name: Upload Using telegram-upload
        run: |
          cd ${{ inputs.project-folder }}
          crave ssh -- "bash /opt/crave/telegram/upload.sh '${{ inputs.device-name }}' '${{ secrets.EXTRA_FILES }}'"
        continue-on-error: true
        env:
          PROJECT_FOLDER: ${{ inputs.project-folder }}
          DEVICE_NAME: ${{ inputs.device-name }}
          EXTRA_FILES: ${{ secrets.EXTRA_FILES }}
